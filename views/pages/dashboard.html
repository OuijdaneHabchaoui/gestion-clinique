<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Clinique WS</title>

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css?v=2026">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        /* ============ DASHBOARD ENHANCED STYLES ============ */

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%);
            border-radius: 20px;
            padding: 32px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            box-shadow: 0 10px 40px rgba(14, 165, 233, 0.25);
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
        }

        .welcome-content h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome-content p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .welcome-date {
            text-align: right;
            opacity: 0.9;
        }

        .welcome-date .date-day {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .welcome-date .date-month {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-details h4 {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .dashboard-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h3 i {
            color: #0ea5e9;
        }

        .card-header a {
            color: #0ea5e9;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }

        .card-header a:hover {
            text-decoration: underline;
        }

        .card-body {
            padding: 0;
        }

        /* Table Styles */
        .modern-table {
            width: 100%;
            border-collapse: collapse;
        }

        .modern-table thead {
            background: #f8fafc;
        }

        .modern-table th {
            padding: 14px 20px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modern-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
            color: #334155;
        }

        .modern-table tr:last-child td {
            border-bottom: none;
        }

        .modern-table tr:hover {
            background: #f8fafc;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-confirme,
        .status-termine {
            background: #dcfce7;
            color: #166534;
        }

        .status-en_attente {
            background: #fef3c7;
            color: #92400e;
        }

        .status-annule {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Quick Actions */
        .quick-actions {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: white;
        }

        .action-btn.primary:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .action-btn.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .action-btn.success:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .action-btn.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .action-btn.warning:hover {
            background: #fde68a;
            transform: translateX(4px);
        }

        .action-btn.outline {
            background: white;
            color: #475569;
            border: 2px solid #e2e8f0;
        }

        .action-btn.outline:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateX(4px);
        }

        .action-btn i {
            width: 20px;
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>

<body class="dashboard-body">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <h1>Clinique WS</h1>
            </div>

            <nav class="sidebar-menu" id="sidebarMenu">
                <!-- Menu généré par JS -->
            </nav>

            <div class="sidebar-footer">
                <a href="#" id="btnLogout" class="menu-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Déconnexion</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Nav -->
            <header class="top-nav">
                <div class="page-title">
                    <h2>Tableau de bord</h2>
                </div>

                <div class="user-nav">
                    <div class="user-profile">
                        <div class="user-avatar" id="headerAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="user-info">
                            <span class="user-name" id="headerUserName">Chargement...</span>
                            <span class="user-role" id="headerUserRole">...</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="content-wrapper">
                <!-- Welcome Banner -->
                <div class="welcome-banner">
                    <div class="welcome-content">
                        <h1>Bonjour, <span id="welcomeName">Utilisateur</span> 👋</h1>
                        <p>Voici un aperçu de votre activité aujourd'hui.</p>
                    </div>
                    <div class="welcome-date">
                        <div class="date-day" id="currentDay">--</div>
                        <div class="date-month" id="currentMonth">---</div>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="stats-grid" id="statsGrid">
                    <!-- Chargé par JS -->
                </div>

                <!-- Main Grid -->
                <div class="dashboard-grid">
                    <!-- Left: Recent Appointments -->
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3><i class="far fa-calendar-check"></i> Rendez-vous récents</h3>
                            <a href="rendez-vous.html" id="linkViewAll">Voir tout →</a>
                        </div>
                        <div class="card-body">
                            <table class="modern-table">
                                <thead>
                                    <tr>
                                        <th>Patient</th>
                                        <th>Date & Heure</th>
                                        <th>Médecin</th>
                                        <th>Statut</th>
                                        <th>Motif</th>
                                    </tr>
                                </thead>
                                <tbody id="recentAppointmentsBody">
                                    <tr>
                                        <td colspan="5" class="text-center">Chargement...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right: Quick Actions Removed -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/services/ApiService.js?v=3"></script>
    <script src="../assets/js/controllers/DashboardController.js?v=3"></script>
    <script>
        // Initialisation du dashboard
        document.addEventListener('DOMContentLoaded', () => {
            // Afficher la date actuelle
            const now = new Date();
            document.getElementById('currentDay').textContent = now.getDate();
            document.getElementById('currentMonth').textContent = now.toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' });

            // Initialiser le dashboard
            const dashboard = new DashboardController();
            dashboard.init();
        });
    </script>
</body>

</html>
