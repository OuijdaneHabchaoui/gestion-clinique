<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Rendez-vous - Clinique WS</title>

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css?v=2026">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        /* Styles spécifiques pour le planning */
        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-en_attente {
            background: #fef3c7;
            color: #d97706;
        }

        .status-confirme {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-termine {
            background: #f3f4f6;
            color: #4b5563;
        }

        .status-annule {
            background: #fee2e2;
            color: #dc2626;
        }


        .text-success {
            color: #16a34a;
        }

        .text-success:hover {
            color: #15803d;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 0.8rem;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: none;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-success:hover {
            background: #15803d;
        }

        /* Styles CSS pour les modales supprimés pour utiliser dashboard.css */
    </style>
</head>

<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fas fa-heartbeat"></i></div>
                <h1>Clinique WS</h1>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu">
                <!-- Menu généré par JS -->
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="btnLogout" class="menu-item"><i class="fas fa-sign-out-alt"></i>
                    <span>Déconnexion</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="page-title">
                    <h2>Planning des Rendez-vous</h2>
                </div>
                <div class="user-nav">
                    <div class="user-profile">
                        <div class="user-avatar" id="headerAvatar">U</div>
                        <div class="user-info">
                            <span class="user-name" id="headerUserName">...</span>
                            <span class="user-role" id="headerUserRole">...</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div id="alertMessage" class="hidden"></div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div class="flex gap-md">
                        <button class="btn btn-primary" id="btnNewRDV" style="display: none;">
                            <i class="fas fa-plus mr-sm"></i> Nouveau Rendez-vous
                        </button>
                        <input type="date" id="dateFilter" class="form-input" style="width: auto;">
                    </div>

                    <div class="search-bar"
                        style="background: white; padding: 0.5rem 1rem; border-radius: 0.5rem; display: flex; gap: 0.5rem; align-items: center;">
                        <i class="fas fa-search text-muted"></i>
                        <input type="text" id="searchInput" placeholder="Chercher un patient..."
                            style="border: none; outline: none;">
                    </div>
                </div>

                <div class="card-section">
                    <div class="section-content p-0">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date & Heure</th>
                                    <th>Patient</th>
                                    <th>Médecin</th>
                                    <th>Motif</th>
                                    <th>Statut</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="rdvTableBody">
                                <tr>
                                    <td colspan="6" class="text-center py-xl">Chargement...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Nouveau RDV -->
    <div class="modal" id="rdvModal" style="display: none;">
        <div class="modal-content" style="max-height: 85vh; overflow-y: auto;">
            <div class="section-header mb-xl">
                <h3>Planifier un Rendez-vous</h3>
                <button class="btn-icon" id="btnCloseModal"><i class="fas fa-times"></i></button>
            </div>

            <form id="rdvForm">
                <div class="grid grid-2 gap-md mb-md">
                    <div class="form-group">
                        <label class="form-label">Patient *</label>
                        <select name="patient_id" id="patientSelect" class="form-input" required>
                            <option value="">Chargement...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Médecin *</label>
                        <select name="medecin_id" id="medecinSelect" class="form-input" required>
                            <option value="">Chargement...</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-2 gap-md mb-md">
                    <div class="form-group">
                        <label class="form-label">Date *</label>
                        <input type="date" name="date" id="inputDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Heure *</label>
                        <input type="time" name="heure" id="inputTime" class="form-input" required>
                    </div>
                </div>

                <div class="grid grid-2 gap-md mb-md">
                    <div class="form-group">
                        <label class="form-label">Type de consultation *</label>
                        <select name="type_consultation" class="form-input" required>
                            <option value="medecine_generale">Médecine Générale</option>
                            <option value="pediatrie">Pédiatrie</option>
                            <option value="gynecologie">Gynécologie</option>
                            <option value="cardiologie">Cardiologie</option>
                            <option value="dermatologie">Dermatologie</option>
                            <option value="orl">ORL</option>
                            <option value="ophtalmologie">Ophtalmologie</option>
                            <option value="radiologie">Radiologie</option>
                            <option value="laboratoire">Laboratoire</option>
                            <option value="orthopedie">Orthopédie</option>
                            <option value="nutrition">Nutrition</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Prix (DH) *</label>
                        <input type="number" name="prix" class="form-input" value="300" min="0" step="50" required>
                    </div>
                </div>

                <div class="grid grid-2 gap-md mb-md">
                    <div class="form-group">
                        <label class="form-label">Mode de paiement</label>
                        <select name="mode_paiement" class="form-input">
                            <option value="especes">Espèces</option>
                            <option value="carte">Carte bancaire</option>
                            <option value="cheque">Chèque</option>
                            <option value="virement">Virement</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Statut</label>
                        <select name="statut" class="form-input">
                            <option value="en_attente">En attente</option>
                            <option value="confirme">Confirmé</option>
                            <option value="termine">Terminé</option>
                            <option value="annule">Annulé</option>
                        </select>
                    </div>
                </div>

                <div class="form-group mb-xl">
                    <label class="form-label">Motif de consultation</label>
                    <textarea name="motif" class="form-input" rows="2"
                        placeholder="Ex: Consultation de routine, Douleurs thoraciques..."></textarea>
                </div>

                <div class="text-right">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Confirmation -->
    <div class="modal" id="confirmationModal" style="z-index: 2000; display: none;">
        <div class="modal-content" style="max-width: 400px; margin: 15% auto;">
            <div class="section-header mb-md"
                style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1.25rem;">Confirmation</h3>
                <button class="btn-icon" id="btnCloseConfirm"
                    style="background:none; border:none; font-size: 1.5rem; cursor: pointer; color: #6b7280;"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="modal-body mb-xl" style="margin-bottom: 2rem;">
                <p id="confirmationMessage" style="color: #4b5563;">Êtes-vous sûr de vouloir effectuer cette action ?
                </p>
            </div>
            <div class="text-right" style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button type="button" class="btn btn-secondary" id="btnCancelConfirm"
                    style="background: #e5e7eb; color: #374151; padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer;">Annuler</button>
                <button type="button" class="btn btn-danger" id="btnConfirmAction"
                    style="background: #ef4444; color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer;">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/services/ApiService.js?v=2"></script>
    <script src="../assets/js/controllers/RendezVousController.js?v=5"></script>
    <script>
        const controller = new RendezVousController();
        controller.init().catch(err => console.error('Erreur init:', err));
    </script>
</body>

</html>
